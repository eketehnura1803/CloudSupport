<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudSupport - Create Ticket</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon">☁️</span>
      <h1>CloudSupport CI/CD Test/h1>
    </div>
    <a class="admin-link" href="admin.html">🛡️ Admin Dashboard</a>
  </header>

  <main class="page-layout">
    <section class="panel">
      <div class="section-title">
        <div class="title-icon purple">👤</div>
        <div>
          <h2>Create Support Ticket</h2>
          <p>Submit a new request to our support team</p>
        </div>
      </div>

      <form id="ticketForm">
        <div class="form-grid">
          <div class="field">
            <label>Full Name</label>
            <input id="fullName" type="text" placeholder="👤 Enter your full name" required />
          </div>

          <div class="field">
            <label>Email</label>
            <input id="email" type="email" placeholder="✉️ Enter your email" required />
          </div>

          <div class="field full">
            <label>Subject</label>
            <input id="subject" type="text" placeholder="🏷️ Brief description of your issue" required />
          </div>

          <div class="field">
            <label>Category</label>
            <select id="category" required>
              <option value="">▦ Select a category</option>
              <option value="Technical">Technical</option>
              <option value="Access">Access</option>
              <option value="Bug">Bug</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="field">
            <label>Priority</label>
            <select id="priority" required>
              <option value="">🚩 Select priority</option>
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>

          <div class="field full">
            <label>Describe your issue</label>
            <textarea id="description" maxlength="500" placeholder="✍️ Please provide as much detail as possible..." required></textarea>
            <span class="counter"><span id="charCount">0</span> / 500</span>
          </div>
        </div>

        <button class="submit-btn" type="submit">✈️ Submit Ticket</button>
      </form>

      <div class="info-box">🛡️ Our team will get back to you as soon as possible.</div>
      <p id="message"></p>
    </section>

    <section class="panel">
      <div class="tickets-header">
        <div class="section-title">
          <div class="title-icon green">📋</div>
          <div>
            <h2>My Tickets</h2>
            <p>Tickets you submitted from this page</p>
          </div>
        </div>

        <select id="statusFilter">
          <option value="All">All Status</option>
          <option value="Open">Open</option>
          <option value="In Progress">In Progress</option>
          <option value="Closed">Closed</option>
        </select>
      </div>

      <div id="ticketsList" class="tickets-list"></div>
    </section>
  </main>

  <script src="js/user.js"></script>
</body>
</html>
