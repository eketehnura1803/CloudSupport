<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudSupport - Admin</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon">☁️</span>
      <h1>CloudSupport Admin</h1>
    </div>
    <a class="admin-link" href="index.html">👤 User Page</a>
  </header>

  <main class="admin-layout">
    <section class="panel admin-panel">
      <div class="tickets-header">
        <div class="section-title">
          <div class="title-icon green">🛠️</div>
          <div>
            <h2>Admin Dashboard</h2>
            <p>Manage support tickets by category and status</p>
          </div>
        </div>

        <div class="admin-filters">
          <select id="categoryFilter">
            <option value="All">All Categories</option>
            <option value="Technical">Technical</option>
            <option value="Access">Access</option>
            <option value="Bug">Bug</option>
            <option value="Other">Other</option>
          </select>

          <select id="statusFilter">
            <option value="All">All Status</option>
            <option value="Open">Open</option>
            <option value="In Progress">In Progress</option>
            <option value="Closed">Closed</option>
          </select>
        </div>
      </div>

      <div id="adminTicketsList" class="admin-tickets-list"></div>
    </section>
  </main>

  <script src="js/admin.js"></script>
</body>
</html>
